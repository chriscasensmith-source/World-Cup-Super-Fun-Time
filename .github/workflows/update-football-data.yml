name: Update Football Data

# Fetches 2026 World Cup data from football-data.org and commits the refreshed
# public/data/world-cup-live.json so the static GitHub Pages site can read it.
on:
  workflow_dispatch: {}        # run manually from the Actions tab
  schedule:
    - cron: "0 */6 * * *"      # every 6 hours

# Allow the workflow to push the updated JSON back to the repo.
permissions:
  contents: write

concurrency:
  group: update-football-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch football-data.org data
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: node scripts/fetchFootballData.mjs

      - name: Commit updated live data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain public/data/world-cup-live.json)" ]]; then
            git add public/data/world-cup-live.json
            git commit -m "chore: refresh World Cup live data [skip ci]"
            git push
          else
            echo "No changes to live data."
          fi
